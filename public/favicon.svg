<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="#0a0a18"/>

  <!-- Decorative glow circle -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>

  <!-- Letter A - left diagonal -->
  <line x1="22" y1="75" x2="50" y2="22" stroke="url(#grad1)" stroke-width="7" stroke-linecap="round"/>
  <!-- Letter A - right diagonal -->
  <line x1="78" y1="75" x2="50" y2="22" stroke="url(#grad1)" stroke-width="7" stroke-linecap="round"/>
  <!-- Letter A - crossbar -->
  <line x1="32" y1="55" x2="68" y2="55" stroke="url(#grad2)" stroke-width="5" stroke-linecap="round"/>

  <!-- Dot accent bottom right -->
  <circle cx="76" cy="75" r="4" fill="#06b6d4" opacity="0.9"/>
</svg>
